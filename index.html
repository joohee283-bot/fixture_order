<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마케팅 집기 발주 시스템 - LGE Visual</title>
    <!-- External Libraries for Export/Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="매장 정보/store_info.css">
    <link rel="stylesheet" href="집기 요청/fixture_request.css">
    <link rel="stylesheet" href="철제스탠드/guide.css">
    <!-- Using Boxicons for lightweight icons styling similar to LG Visual -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!-- Global Header (PC Full Width, Mobile responsive) -->
    <header class="app-header">
        <div class="header-container item__wrap left">
            <div class="header-logo button logo" style="cursor:pointer;" onclick="app.navigateTo('home')">
                <img src="images/main_bi.svg" alt="LG Visual BI" style="height: 32px; display: block;">
            </div>
        </div>
        <div class="header-actions item__wrap right">
            <button class="icon-btn button"><i class='bx bx-help-circle tooltip__icon'></i></button>
            <button class="icon-btn button"><i class='bx bx-star'></i></button>
            <button class="icon-btn button"><img src="images/ico_noti.svg" alt="알림"
                    style="width:22px; height:22px;"></button>
            <button class="icon-btn button basket"><i class='bx bx-shopping-bag'></i>
                <div class="count"><span class="count__number">0</span></div>
            </button>
            <button class="icon-btn button"><i class='bx bx-menu'></i></button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main" class="app-main">
        <!-- Views injected here -->
    </main>

    <!-- Modals (Global) -->
    <div id="storeSearchModal" class="modal-overlay">
        <div class="modal-content bottom-sheet">
            <div class="modal-header">
                <h3>매장찾기</h3>
                <button class="close-btn" onclick="app.closeModal('storeSearchModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="search-box">
                    <input type="text" id="storeSearchInput" placeholder="매장명을 입력하세요">
                    <button class="btn-icon" onclick="app.searchStore()"><i class='bx bx-search'></i></button>
                </div>
                <div id="storeSearchResult" class="store-result">
                    <!-- Search results -->
                </div>

                <div class="form-group">
                    <label>휴대전화</label>
                    <input type="tel" id="userPhone" placeholder="010-0000-0000" value="010-3098-2685">
                </div>
                <div class="form-group">
                    <label>수령인</label>
                    <input type="text" id="userName" placeholder="이름 입력" value="홍민섭">
                </div>
            </div>
            <div class="modal-footer flex-row-between mt-3">
                <button class="btn btn-outline" style="width: 48%;" onclick="app.closeModal('storeSearchModal')">이전
                    단계</button>
                <button class="btn btn-primary" style="width: 48%; margin-left: auto;" onclick="app.confirmStore()">입력
                    완료</button>
            </div>
        </div>
    </div>

    <!-- Floating Action Button (Global) -->
    <div id="fab-container" class="fab-container">
        <button id="fabMainBtn" class="fab-main-btn flex-row-center" onclick="app.toggleFabMenu()">
            <span class="fab-icon"
                style="font-size:1.8rem; line-height:1; display:inline-block; transition:transform 0.3s;">+</span>
            <span class="fab-text"
                style="display:none; margin-left:8px; white-space:nowrap; font-size:0.95rem; font-weight:bold;">마케팅/VMD
                집기 요청</span>
        </button>
    </div>

    <!-- ===== TEMPLATES ===== -->

    <template id="tpl-home">
        <div class="page__wrapper">
            <div class="page__content main">
                <div class="page-main">
                    <!-- Top 배너 영역 -->
                    <div class="top__banner__container">
                        <img src="images/main_banner.png" class="top__banner" alt="메인 배너">
                    </div>

                    <!-- 페이지 이동 버튼 영역 -->
                    <div class="link__button__container">
                        <button class="link__button__box" onclick="app.navigateTo('productRequest')">
                            <p class="title">제작물 요청</p>
                            <picture>
                                <source media="(max-width: 768px)" srcset="images/main_link_img1_mo.png">
                                <img class="bg__image" src="images/main_link_img1.png">
                            </picture>
                            <div class="tooltip"><img src="images/ico_gray_question.svg" class="tooltip__icon"></div>
                        </button>
                        <button class="link__button__box" onclick="app.navigateTo('storeList')">
                            <p class="title white">매장 정보</p>
                            <picture>
                                <source media="(max-width: 768px)" srcset="images/main_link_img2_mo.png">
                                <img class="bg__image" src="images/main_link_img2.png">
                            </picture>
                            <div class="tooltip"><img src="images/ico_gray_question.svg" class="tooltip__icon"
                                    style="filter: brightness(0) invert(1);"></div>
                        </button>
                        <button class="link__button__box" onclick="app.navigateTo('popRequest')">
                            <p class="title">POP 요청</p>
                            <picture>
                                <source media="(max-width: 768px)" srcset="images/main_link_img3_mo.png">
                                <img class="bg__image" src="images/main_link_img3.png">
                            </picture>
                            <div class="tooltip"><img src="images/ico_gray_question.svg" class="tooltip__icon"></div>
                        </button>
                        <button class="link__button__box" onclick="app.navigateTo('guideList')">
                            <p class="title">통합 가이드</p>
                            <picture>
                                <source media="(max-width: 768px)" srcset="images/main_link_img4_mo.png">
                                <img class="bg__image" src="images/main_link_img4.png">
                            </picture>
                            <div class="tooltip"><img src="images/ico_gray_question.svg" class="tooltip__icon"></div>
                        </button>
                    </div>

                    <!-- POP 가이드 영역 -->
                    <div class="pop__guide__container">
                        <div class="title__box">
                            <div class="pop__title__box">
                                <p class="pop__title">POP 사용설명서</p>
                                <img src="images/ico_gray_question.svg" alt="도움말" class="tooltip__icon">
                            </div>
                            <button class="more__button icon__border">
                                <img src="images/ico_main_plus.svg" alt="더보기">
                            </button>
                        </div>

                        <div class="item__container">
                            <button class="item__box">
                                <div class="item__img__box">
                                    <div class="pop__card__header">25년 LG 스타일러 신제품 POP(전매)</div>
                                    <div class="tag__box">
                                        <span class="tag--new">NEW</span>
                                        <span class="tag--pink">온대</span>
                                    </div>
                                    <img
                                        src="https://images.unsplash.com/photo-1584622781564-1d987f7333c1?auto=format&fit=crop&w=480&h=240&q=80">
                                </div>
                                <div class="item">
                                    <div class="category">
                                        육성제품
                                        <img src="images/ico_breadcrumb.png" class="category__icon">
                                        스타일러
                                    </div>
                                    <div class="title">25년 LG 스타일러 신제품 POP...</div>
                                    <p class="date">2026.01.15</p>
                                </div>
                            </button>
                            <button class="item__box">
                                <div class="item__img__box">
                                    <div class="pop__card__header">26년 LG스타일러 영상 스탠드 전용 POP</div>
                                    <div class="tag__box">
                                        <span class="tag--new">NEW</span>
                                    </div>
                                    <img
                                        src="https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?auto=format&fit=crop&w=480&h=240&q=80">
                                </div>
                                <div class="item">
                                    <div class="category">
                                        육성제품
                                        <img src="images/ico_breadcrumb.png" class="category__icon">
                                        스타일러
                                    </div>
                                    <div class="title">26년 LG스타일러 영상 스탠드...</div>
                                    <p class="date">2026.01.12</p>
                                </div>
                            </button>
                        </div>
                    </div>

                    <!-- Bottom 배너 -->
                    <div class="bottom__banner__container">
                        <picture>
                            <source media="(max-width: 768px)" srcset="images/main_bottom_banner_img_mo.png">
                            <img src="images/main_bottom_banner_img_pc.png" alt="Bottom Banner">
                        </picture>
                        <div class="banner__text__box">
                            <p class="banner__text__title">LG베스트샵 POP</p>
                            <p class="banner__text__content">
                                효율적인 매장 운영을 위한 맞춤형 POP 솔루션 제공!
                            </p>
                        </div>
                    </div>

                    <!-- 공지사항 영역 -->
                    <div class="notice__container">
                        <div class="title__box">
                            <p class="title">공지사항</p>
                            <button class="more__button icon__border">
                                <img src="images/ico_main_plus.svg" alt="더보기">
                            </button>
                        </div>

                        <div class="item__box">
                            <button class="item">안내] 인사이동으로 인한 소속팀 변경</button>
                            <button class="item">안내] 각 지점 담당 현장대리인 정보_260116</button>
                            <button class="item">[공지] 설 연휴 택배 발송 마감 및 재개 일정 안내(2/...</button>
                            <button class="item">[NEW] 요청 내역 시안 확인 및 다운로드 기능 안내</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </template>


    <!-- Footer 영역 -->
    <footer id="footer" class="footer">
        <hr class="copyright__line" style="margin-bottom: 24px;">
        <div class="footer__button__box">
            <button class="footer__button">Privacy Policy</button>
            <button class="footer__button">Terms & Conditions</button>
        </div>
        <div class="copyright__box">
            <img src="images/ico_footer_logo.svg" alt="footer logo" class="footer__logo">
            <p class="copyright__text">ⓒ LG Electronics</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script src="매장 정보/store_info.js"></script>
    <script src="집기 요청/fixture_request.js"></script>
    <script src="철제스탠드/guide.js"></script>

</body>

</html>
