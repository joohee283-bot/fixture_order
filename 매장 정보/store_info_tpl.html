<!-- 5. Store Information Feature -->
<template id="tpl-store-list">
    <div class="pc-content-container">
        <div class="page-header flex-row-center" style="margin-bottom: 2rem;">
            <button class="icon-btn" onclick="app.navigateTo('home')"><i class='bx bx-chevron-left'
                    style="font-size:1.5rem;"></i></button>
            <h2 style="font-weight: 700; font-size: 1.75rem;">매장 정보</h2>
            <div style="width:24px;"></div>
        </div>
        <p class="page-desc" style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 2.5rem;">매장 점검에
            필요한 각 매장의 내역뿐 및 지점별 HSAD 현장대리인 담당자 정보,<br>분기별 패킹 점검 결과 및 사진을 확인할 수 있는 메뉴입니다.</p>

        <div class="search-sort-container">
            <div class="search-bar-underline">
                <input type="text" id="store-page-search-input" placeholder="검색어를 입력하세요">
                <span class="search-icon-right" onclick="app.renderStoreList()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </span>
            </div>
            <div class="sort-container">
                <button class="sort-btn">정렬
                    <span class="sort-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" y1="21" x2="4" y2="14" />
                            <line x1="4" y1="10" x2="4" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="12" />
                            <line x1="12" y1="8" x2="12" y2="3" />
                            <line x1="20" y1="21" x2="20" y2="16" />
                            <line x1="20" y1="12" x2="20" y2="3" />
                            <line x1="2" y1="14" x2="6" y2="14" />
                            <line x1="10" y1="8" x2="14" y2="8" />
                            <line x1="18" y1="16" x2="22" y2="16" />
                        </svg>
                    </span>
                </button>
            </div>
        </div>
        <div class="list-controls">
            <div class="total-count">총 <span id="store-total">0</span>건</div>
            <div class="view-toggles">
                <button class="view-toggle active" data-view="card"
                    onclick="app.setStoreView('card', this)">카드형</button>
                <button class="view-toggle" data-view="list" onclick="app.setStoreView('list', this)">리스트</button>
                <button class="btn-download-list" id="open-list-download-btn" onclick="app.openStoreListDownload()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    매장 리스트 다운로드
                </button>
            </div>
        </div>
        <div class="filter-section" id="zone-filters">
            <div class="zone-level1-row">
                <button class="filter-btn active" onclick="app.setStoreFilterLevel1('all', this)">전체</button>
                <button class="filter-btn" onclick="app.setStoreFilterLevel1('매장외부', this)">매장 외부</button>
                <button class="filter-btn" onclick="app.setStoreFilterLevel1('제품존', this)">제품존</button>
                <button class="filter-btn" onclick="app.setStoreFilterLevel1('연출존', this)">연출존</button>
            </div>
            <div class="zone-level2-row" id="zone-level2-row" style="display: none;">
            </div>
        </div>
        <div class="store-grid" id="store-container">
        </div>
    </div>
    <!-- List Download Modal -->
    <div id="list-download-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content list-download-content">
            <span class="close-btn" id="close-list-download" onclick="app.closeStoreListDownload()">&times;</span>
            <h2 style="font-size: 1.3rem; margin-bottom: 1.2rem;">매장 리스트 다운로드</h2>
            <div class="download-filters-container">
                <div class="filter-row-vertical">
                    <div class="filter-group-v">
                        <label>유통</label>
                        <div class="filter-button-group" id="dist-btn-group">
                            <button class="filter-btn-item active"
                                onclick="app.toggleDlFilter('dist', 'all', this)">전체</button>
                            <button class="filter-btn-item"
                                onclick="app.toggleDlFilter('dist', 'B2B', this)">B2B</button>
                            <button class="filter-btn-item" onclick="app.toggleDlFilter('dist', '기타', this)">기타</button>
                            <button class="filter-btn-item" onclick="app.toggleDlFilter('dist', '전매', this)">전매</button>
                            <button class="filter-btn-item" onclick="app.toggleDlFilter('dist', '혼매', this)">혼매</button>
                        </div>
                    </div>
                    <div class="filter-group-v" style="margin-top: 0.4rem;">
                        <label>채널</label>
                        <div class="filter-button-group" id="channel-btn-group">
                        </div>
                    </div>
                    <div class="filter-group-v" style="margin-top: 0.4rem;">
                        <label>ZONE</label>
                        <div class="filter-button-group" id="modal-zone-level1-group" style="margin-bottom: 0.5rem;">
                            <button class="filter-btn-item active"
                                onclick="app.setDlZoneLevel1('all', this)">전체</button>
                            <button class="filter-btn-item" onclick="app.setDlZoneLevel1('매장외부', this)">매장 외부</button>
                            <button class="filter-btn-item" onclick="app.setDlZoneLevel1('제품존', this)">제품존</button>
                            <button class="filter-btn-item" onclick="app.setDlZoneLevel1('연출존', this)">연출존</button>
                        </div>
                        <div id="modal-zone-level2-wrap" style="display: none;">
                            <div class="filter-button-group" id="modal-zone-level2-group">
                            </div>
                            <div class="selected-tags-container" id="zone-tags-container"></div>
                        </div>
                    </div>
                </div>
                <div class="filter-row download-main-filters">
                    <div class="filter-group filter-group-date">
                        <label>최근 점검일</label>
                        <div class="date-range">
                            <input type="date" value="2026-03-03" id="start-date" class="form-input-date">
                            <span>-</span>
                            <input type="date" value="2026-03-10" id="end-date" class="form-input-date">
                        </div>
                    </div>
                    <div class="filter-group filter-group-search">
                        <div class="search-modal-group">
                            <input type="text" placeholder="검색어를 입력해주세요" id="modal-search-input" class="modal-search-input">
                            <button class="btn-modal-search" id="modal-search-btn" onclick="app.performModalSearch()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="11" cy="11" r="8" />
                                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="download-results-area"
                style="margin-top:2rem; max-height:400px; overflow-y:auto; border:1px solid #eee;">
                <table class="download-table" style="width:100%; border-collapse:collapse; font-size:0.9rem;">
                    <thead style="background:#f9f9f9; position:sticky; top:0;">
                        <tr>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;"><input
                                    type="checkbox" id="check-all-stores" checked
                                    onclick="app.toggleAllDlItemsRenewal(this.checked)"></th>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;">매장명</th>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;">유통</th>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;">채널</th>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;">주소</th>
                            <th style="padding:10px; border-bottom:1px solid #eee; text-align:left;">점검상태</th>
                        </tr>
                    </thead>
                    <tbody id="modal-results-body">
                    </tbody>
                </table>
            </div>
            <div class="modal-footer-btns" style="margin-top:2.5rem; display:flex; justify-content:center;">
                <button class="btn-download-excel" id="confirm-list-download-btn" onclick="app.exportStoreListRenewal()"
                    style="padding:1rem 3rem; background:#A50034; color:white; border:none; border-radius:4px; font-size:1.1rem; font-weight:700; cursor:pointer;">선택
                    매장 다운로드</button>
            </div>
        </div>
    </div>
</template>

<template id="tpl-store-detail">
    <div class="pc-content-container" id="store-detail-root">
        <div class="page-header flex-row-center">
            <button class="icon-btn" onclick="app.navigateTo('storeList')"><i class='bx bx-chevron-left'
                    style="font-size:1.5rem;"></i></button>
            <h2>매장 상세 정보</h2>
            <div style="width:24px;"></div>
        </div>

        <div class="flex-row-center mb-4 mt-3" style="gap: 10px; justify-content: flex-end;">
            <button class="btn-outline" style="padding: 8px 16px;">매장 문의 확인</button>
            <button class="btn-outline" style="padding: 8px 16px;">매장 정보 수정</button>
        </div>

        <!-- Merged Detail Content Grid -->
        <div class="detail-content" id="detail-card-layout">
            <!-- Injected via JS (left-section and right-section) -->
        </div>

        <!-- Image Download Button -->
        <div id="detail-actions-footer"
            style="margin-top: 2rem; text-align: right; display: flex; justify-content: flex-end; gap: 1rem;">
            <!-- Injected via JS inside renderStoreDetail -->
        </div>

        <!-- Integrated Fixture Status Section (Below Information) -->
        <div class="history-section"
            style="margin-top: 3rem; border-top: 2px solid #333; padding-top: 2rem; background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div id="storeFixtureStatusList">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="modal-overlay" onclick="if(event.target === this) app.closeGallery()">
        <div class="modal-content gallery-modal-content">
            <span class="close-btn" onclick="app.closeGallery()">&times;</span>
            <h3 style="margin-bottom: 1.5rem; font-weight: 700;">Zone 별 매장 현황</h3>
            <div id="gallery-filters" class="gallery-filters">
                <!-- Injected via JS -->
            </div>
            <div id="gallery-container" class="gallery-grid">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div id="zoom-modal" class="modal-overlay" onclick="app.closeZoom()">
        <div class="modal-content"
            style="background: transparent; padding: 0; box-shadow: none; display: flex; justify-content: center; align-items: center; position: relative;">
            <span class="close-btn" style="color: white; top: -30px; right: 0;">&times;</span>
            <button class="nav-arrow prev-arrow" onclick="event.stopPropagation(); app.navigateZoom(-1)"
                style="position: absolute; left: -60px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 50px; height: 50px; cursor: pointer;">
                <i class='bx bx-chevron-left' style="font-size: 2rem;"></i>
            </button>
            <img id="zoom-image" src=""
                style="max-width: 90vw; max-height: 80vh; border-radius: 8px; box-shadow: 0 4px 30px rgba(0,0,0,0.5);">
            <button class="nav-arrow next-arrow" onclick="event.stopPropagation(); app.navigateZoom(1)"
                style="position: absolute; right: -60px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 50px; height: 50px; cursor: pointer;">
                <i class='bx bx-chevron-right' style="font-size: 2rem;"></i>
            </button>
        </div>
    </div>

    <!-- Image Download Modal -->
    <div id="download-modal" class="modal-overlay" onclick="if(event.target === this) app.closeImageDownload()">
        <div class="modal-content" style="max-width: 450px; padding: 2.5rem;">
            <span class="close-btn" onclick="app.closeImageDownload()">&times;</span>
            <h2 style="font-size: 1.3rem; margin-bottom: 0.5rem; font-weight: 700;">매장 이미지 다운로드</h2>
            <p style="color: #666; font-size: 0.95rem; margin-bottom: 0.25rem;">다운로드할 존 이미지를 선택해 주세요.</p>
            <p style="color: #999; font-size: 0.85rem; margin-bottom: 1.5rem;">ZONE을 여러 개 선택하여 한 번에 다운로드할 수 있습니다.</p>

            <div id="dl-image-zones" style="margin-bottom: 2rem;">
                <div class="filter-level-1"
                    style="display: flex; gap: 0.4rem; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
                    <button class="chip active" style="flex:1" onclick="app.setImgDlLevel1('all', this)">전체</button>
                    <button class="chip" style="flex:1" onclick="app.setImgDlLevel1('매장외부', this)">매장 외부</button>
                    <button class="chip" style="flex:1" onclick="app.setImgDlLevel1('제품존', this)">제품존</button>
                    <button class="chip" style="flex:1" onclick="app.setImgDlLevel1('연출존', this)">연출존</button>
                </div>
                <div class="filter-level-2" id="img-dl-level2-container"
                    style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;">
                    <!-- Injected via JS -->
                </div>
            </div>

            <button class="btn btn-primary btn-block" id="confirmImgDownloadBtn" onclick="app.executeImageDownload()"
                style="background: var(--lg-red); color: white; padding: 1rem; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%;">다운로드</button>
        </div>
    </div>
</template>

<template id="tpl-fixture-status-detail">
    <div class="pc-content-container">
        <div class="view-fixture-detail">
            <div class="page-header flex-row-center">
                <button class="icon-btn" id="statusDetailBackBtn"><i class='bx bx-chevron-left'
                        style="font-size:1.5rem;"></i></button>
                <div style="font-weight:bold; font-size:1.1rem; flex:1; text-align:center;">집기 요청 현황</div>
                <div style="width:40px;"></div>
            </div>

            <div class="fixture-detail-layout">
                <div class="fixture-preview-side">
                    <div class="fixture-main-img-box">
                        <img id="statusDetailImg" src="" alt="Fixture">
                    </div>
                </div>

                <div class="fixture-form-side">
                    <div class="pd-horizontal">
                        <h2 id="statusDetailName"
                            style="font-size: 1.8rem; font-weight: 800; margin-bottom: 24px; color: #333;"></h2>

                        <div class="info-row-item">
                            <span class="info-label-text">사이즈</span>
                            <span id="statusDetailSize" class="info-value-text"></span>
                        </div>

                        <hr style="border: none; border-top: 1px solid #eee; margin: 24px 0;">

                        <!-- Case 1: Active Request Exists -->
                        <div id="activeRequestInfo" style="display:none;">
                            <h4 style="font-size:1.0rem; font-weight:bold; margin-bottom:16px;">요청 내용</h4>
                            <div class="checkbox-grid mb-4">
                                <label class="custom-checkbox">
                                    <input type="checkbox" checked disabled>
                                    <span class="checkmark"></span>
                                    <span id="statusReqTypeText"></span>
                                </label>
                            </div>

                            <div class="form-group">
                                <label style="font-size:1.0rem; font-weight:bold;">요청 매장</label>
                                <div class="selected-store-card-v2">
                                    <div id="statusStoreName"
                                        style="font-weight:bold; font-size: 1.1rem; margin-bottom:12px;"></div>
                                    <div class="flex-row-between text-muted" style="font-size:0.95rem;">
                                        <span>요청일</span>
                                        <span id="statusReqDate"></span>
                                    </div>
                                    <div class="flex-row-between text-muted mt-2" id="statusInstallDateRow"
                                        style="display:none; font-size:0.95rem;">
                                        <span>설치일</span>
                                        <span id="statusInstallDate"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-5">
                                <button class="btn btn-block btn-light-border"
                                    style="color:var(--text-main); height:54px; font-weight:bold; font-size: 1.1rem; border-radius: 8px;"
                                    onclick="app.cancelFixtureRequest()">요청 취소</button>
                            </div>
                        </div>

                        <!-- Case 2: No Active Request -->
                        <div id="noRequestInfo">
                            <h4 style="font-size:1.0rem; font-weight:bold; margin-bottom:16px;">요청 내용</h4>
                            <div class="checkbox-grid" style="margin-bottom: 32px;">
                                <label class="custom-checkbox"><input type="radio" name="statusNewReq" value="회수">
                                    <span class="checkmark"></span> 회수</label>
                                <label class="custom-checkbox"><input type="radio" name="statusNewReq" value="A/S">
                                    <span class="checkmark"></span> A/S</label>
                                <label class="custom-checkbox"><input type="radio" name="statusNewReq" value="추가제작">
                                    <span class="checkmark"></span> 추가제작</label>
                            </div>

                            <div class="form-group" style="margin-bottom: 40px;">
                                <label style="font-size:1.0rem; font-weight:bold;">요청 매장</label>
                                <div class="selected-store-card-v2">
                                    <div id="statusStoreNameNoReq" style="font-weight:bold; font-size: 1.1rem;"></div>
                                </div>
                            </div>

                            <div class="mt-5">
                                <button class="btn btn-primary btn-block"
                                    style="height:56px; font-weight:bold; background-color:#A50034; border-color:#A50034; font-size: 1.2rem; border-radius: 8px;"
                                    onclick="app.handleFixtureStatusRequest()">요청하기</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
